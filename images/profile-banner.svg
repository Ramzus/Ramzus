<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title>Marcel Marquez profile banner</title>
  <desc>Minimal profile banner for Marcel Marquez, Head of Engineering</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2238" />
      <stop offset="55%" stop-color="#153f52" />
      <stop offset="100%" stop-color="#d97836" />
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0b1627" stop-opacity="0.68" />
      <stop offset="100%" stop-color="#0b1627" stop-opacity="0.18" />
    </linearGradient>
    <filter id="soft-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" />
    </filter>
  </defs>

  <rect width="1200" height="320" rx="30" fill="url(#bg)" />

  <circle cx="1040" cy="248" r="210" fill="#ffbe88" fill-opacity="0.18" filter="url(#soft-blur)" />
  <circle cx="130" cy="40" r="130" fill="#08101c" fill-opacity="0.35" filter="url(#soft-blur)" />

  <rect x="54" y="42" width="690" height="236" rx="28" fill="url(#panel)" stroke="#f6eee5" stroke-opacity="0.12" />

  <path d="M760 72 H1080" stroke="#f6eee5" stroke-opacity="0.18" stroke-width="2" />
  <path d="M812 112 H1128" stroke="#f6eee5" stroke-opacity="0.14" stroke-width="2" />

  <g transform="translate(90 78)">
    <rect width="164" height="34" rx="17" fill="#f6eee5" fill-opacity="0.12" stroke="#f6eee5" stroke-opacity="0.2" />
    <text x="18" y="23" fill="#f6eee5" font-family="Verdana, sans-serif" font-size="16" letter-spacing="1.8">LILLE, FRANCE</text>

    <text x="0" y="92" fill="#fff7ee" font-family="Georgia, 'Times New Roman', serif" font-size="60" font-weight="700">Marcel Marquez</text>
    <text x="0" y="132" fill="#ffd9bb" font-family="Verdana, sans-serif" font-size="24">Head of Engineering | Software Architect | Builder</text>
    <text x="0" y="178" fill="#f6eee5" font-family="Verdana, sans-serif" font-size="19">I build engineering organizations, delivery systems, and technical foundations</text>
    <text x="0" y="206" fill="#f6eee5" font-family="Verdana, sans-serif" font-size="19">that help teams ship ambitious products with clarity and confidence.</text>
  </g>

  <g transform="translate(905 158)">
    <rect width="210" height="36" rx="18" fill="#0d1d31" fill-opacity="0.34" stroke="#f6eee5" stroke-opacity="0.16" />
    <rect y="48" width="210" height="36" rx="18" fill="#0d1d31" fill-opacity="0.28" stroke="#f6eee5" stroke-opacity="0.14" />
    <rect y="96" width="210" height="36" rx="18" fill="#0d1d31" fill-opacity="0.24" stroke="#f6eee5" stroke-opacity="0.12" />
    <text x="25" y="24" fill="#fff7ee" font-family="Verdana, sans-serif" font-size="19">Leadership</text>
    <text x="25" y="72" fill="#fff7ee" font-family="Verdana, sans-serif" font-size="19">Architecture</text>
    <text x="25" y="120" fill="#fff7ee" font-family="Verdana, sans-serif" font-size="19">Delivery</text>
  </g>
</svg>
