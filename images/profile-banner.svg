<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title>Marcel Marquez profile banner</title>
  <desc>Decorative banner for Marcel Marquez, Head of Engineering</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10233d" />
      <stop offset="58%" stop-color="#1c5360" />
      <stop offset="100%" stop-color="#ef7d32" />
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="28" />
    </filter>
  </defs>

  <rect width="1200" height="320" rx="30" fill="url(#bg)" />

  <circle cx="1020" cy="72" r="150" fill="#ffd6a8" fill-opacity="0.2" filter="url(#blur)" />
  <circle cx="160" cy="300" r="170" fill="#09111f" fill-opacity="0.45" filter="url(#blur)" />

  <g opacity="0.16" stroke="#f7f2eb" stroke-width="2" fill="none">
    <path d="M40 278 C220 210, 360 210, 500 278" />
    <path d="M500 278 C680 185, 850 185, 1035 278" />
    <path d="M770 50 L1100 50" />
    <path d="M820 95 L1140 95" />
    <path d="M860 140 L1110 140" />
  </g>

  <g transform="translate(74 62)">
    <rect width="172" height="38" rx="19" fill="#f7f2eb" fill-opacity="0.14" stroke="#f7f2eb" stroke-opacity="0.24" />
    <text x="20" y="25" fill="#f7f2eb" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="18" letter-spacing="1.6">LILLE, FRANCE</text>

    <text x="0" y="103" fill="#fff8f0" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="700">Marcel Marquez</text>
    <text x="0" y="146" fill="#ffe8cf" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="28">Engineering leadership with builder energy</text>
    <text x="0" y="190" fill="#f7f2eb" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="18" textLength="360" lengthAdjust="spacingAndGlyphs">Architecture, delivery, and</text>
    <text x="0" y="216" fill="#f7f2eb" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="18" textLength="380" lengthAdjust="spacingAndGlyphs">product development for teams</text>
    <text x="0" y="242" fill="#f7f2eb" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="18" textLength="430" lengthAdjust="spacingAndGlyphs">that need calm systems and fast outcomes.</text>
  </g>

  <g transform="translate(996 170)">
    <rect width="156" height="36" rx="18" fill="#10233d" fill-opacity="0.36" stroke="#f7f2eb" stroke-opacity="0.22" />
    <rect y="48" width="156" height="36" rx="18" fill="#10233d" fill-opacity="0.3" stroke="#f7f2eb" stroke-opacity="0.2" />
    <rect y="96" width="156" height="36" rx="18" fill="#10233d" fill-opacity="0.26" stroke="#f7f2eb" stroke-opacity="0.18" />
    <text x="26" y="25" fill="#fff8f0" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="20">Leadership</text>
    <text x="19" y="73" fill="#fff8f0" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="20">Architecture</text>
    <text x="26" y="121" fill="#fff8f0" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="20">Delivery</text>
  </g>
</svg>
